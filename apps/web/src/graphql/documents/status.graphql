fragment FullStatusSnapshot on StatusSnapshot {
  timestamp
  pending_triage_count
  gh {
    state
    message
  }
  database {
    state
    message
  }
  setup {
    complete
    mappingCount
    reason
  }
  configuration {
    source_type
    destination_type
    vibe_kanban_board_active
  }
  destinations {
    id
    state
    lastOkAt
    message
  }
  scouts {
    id
    state
    lastPollAt
    nextPollAt
    lastError
    skipReason
    last_poll {
      candidates_count
      skipped_unmapped
      issues_created
    }
  }
  manual_sync {
    canRun
    reason
    cooldownUntil
  }
  scheduled_sync {
    enabled
  }
}

query StatusQuery {
  status {
    ...FullStatusSnapshot
  }
}

subscription StatusUpdatedSubscription {
  statusUpdated {
    ...FullStatusSnapshot
  }
}
